<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>GiftedHandCo Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#c8a2c8;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:600;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.order{
background:white;
border-radius:12px;
padding:18px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.order h3{
margin:0 0 6px 0;
}

.meta{
font-size:14px;
margin-bottom:6px;
}

.items{
font-size:14px;
margin-top:6px;
}

img{
max-width:200px;
border-radius:8px;
margin-top:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
cursor:pointer;
margin-top:10px;
}

.collected{
background:#777;
}

.badge{
display:inline-block;
padding:4px 8px;
background:#ff9800;
color:white;
border-radius:6px;
font-size:12px;
margin-left:8px;
}

</style>

</head>

<body>

<header>GiftedHandCo Orders Dashboard</header>

<div class="container" id="orders"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
"https://mzcfodvfhulmhffhbhpu.supabase.co",
"sb_publishable_6a-rZ0ntq9tBzo4tCESuYw_ZCQwaH_G"
);

let productsMap={};

async function loadProducts(){

const {data}=await supabaseClient
.from("products")
.select("id,name");

productsMap={};

data.forEach(p=>{
productsMap[p.id]=p.name;
});

}

function formatItems(items){

let html="";

items.forEach(i=>{
const name=productsMap[i.id]||("Product "+i.id);
html+=`${name} × ${i.qty}<br>`;
});

return html;

}

function renderOrder(order){

const div=document.createElement("div");

div.className="order";

div.innerHTML=`

<h3>
${order.name}
<span class="badge">
${order.collected ? "Collected" : "Pending"}
</span>
</h3>

<div class="meta">📱 ${order.phone}</div>

<div class="meta">💰 Advance: ₹${order.advance}</div>

<div class="items">
<b>Items:</b><br>
${formatItems(order.items)}
</div>

<a href="${order.screenshot_url}" target="_blank">
<img src="${order.screenshot_url}">
</a>

<br>

${
!order.collected
? `<button onclick="markCollected('${order.order_id}',this)">Mark Collected</button>`
: `<button class="collected">Collected ✔</button>`
}

`;

document.getElementById("orders").prepend(div);

}

async function loadOrders(){

const {data,error}=await supabaseClient
.from("orders")
.select("*")
.order("created_at",{ascending:false});

if(error){
console.error(error);
return;
}

document.getElementById("orders").innerHTML="";

data.forEach(renderOrder);

}

async function markCollected(orderId,btn){

await supabaseClient
.from("orders")
.update({collected:true})
.eq("order_id",orderId);

btn.innerText="Collected ✔";
btn.classList.add("collected");

}

supabaseClient
.channel("orders")
.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"orders"
},
payload=>{
renderOrder(payload.new);
}
)
.subscribe();

async function init(){

await loadProducts();
await loadOrders();

}

init();

</script>

</body>
</html>
