<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>GiftedHandCo ✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
#loaderOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
z-index:99999;
opacity:0;
pointer-events:none;
transition:opacity .25s ease;
}

#loaderOverlay.show{
opacity:1;
pointer-events:all;
}

.loaderBox{
background:white;
padding:30px 40px;
border-radius:14px;
text-align:center;
box-shadow:0 12px 30px rgba(0,0,0,0.3);
}

.spinner{
width:45px;
height:45px;
border:4px solid #eee;
border-top:4px solid #c8a2c8;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:12px;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#f8c8dc,#c8a2c8);
min-height:100vh;
}

header{
text-align:center;
padding:22px;
font-size:28px;
font-weight:600;
color:white;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:20px;
padding:25px;
}

.card{
background:white;
border-radius:18px;
padding:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:12px;
}

button{
background:#c8a2c8;
border:none;
padding:10px 14px;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:8px;
font-size:14px;
}

button:hover{
background:#b88db8;
}

.cart-btn{
position:fixed;
bottom:25px;
right:25px;
width:65px;
height:65px;
border-radius:50%;
background:#d4af37;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.cart-count{
position:absolute;
top:-5px;
right:-5px;
background:#ff3b30;
color:white;
font-size:12px;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
width:90%;
max-width:420px;
padding:22px;
border-radius:16px;
max-height:90vh;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #eee;
}

.qty-btn{
padding:4px 8px;
font-size:12px;
margin-left:4px;
}

label{
font-size:13px;
font-weight:500;
display:block;
margin-top:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:6px;
border-radius:8px;
border:1px solid #ddd;
}

.out{
color:#e53935;
font-weight:600;
}
#toast{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-60%);
min-width:280px;
max-width:90%;
padding:18px 24px;
border-radius:14px;
color:white;
font-size:18px;
font-weight:600;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
opacity:0;
pointer-events:none;
transition:all .35s ease;
z-index:9999;
}

#toast.show{
opacity:1;
transform:translate(-50%,-50%);
}

.toast-success{
background:#2e7d32;
}

.toast-error{
background:#d32f2f;
}

</style>

</head>

<body>

<header>GiftedHandCo ✨</header>

<div class="grid" id="products"></div>

<div class="cart-btn" onclick="openCart()">
🛒
<div class="cart-count" id="cartCount">0</div>
</div>

<div class="modal" id="cartModal">
<div class="modal-content">

<h2>Your Cart 🛒</h2>

<div id="cartItems"></div>
<div id="totals"></div>

<hr>

<label>Name</label> <input placeholder="Enter your name" id="name">

<label>Phone</label> <input placeholder="Enter phone number" id="phone">

<label>Advance Paid (₹)</label> <input type="number" placeholder="Enter advance amount" id="paid">

<label>Upload Payment Screenshot</label> <input type="file" id="screenshot" accept="image/*">

<button onclick="placeOrder()">Place Order</button>

<button onclick="clearCart()" style="background:#e53935;margin-top:8px">
Clear Cart
</button>

<button onclick="closeCart()" style="background:gray;margin-top:8px">
Close
</button>

</div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
function showLoader(){
document.getElementById("loaderOverlay").classList.add("show");
}

function hideLoader(){
document.getElementById("loaderOverlay").classList.remove("show");
}
const supabaseClient = supabase.createClient(
"https://mzcfodvfhulmhffhbhpu.supabase.co",
"sb_publishable_6a-rZ0ntq9tBzo4tCESuYw_ZCQwaH_G"
);

let productsData=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

`function showToast(msg){
const toast=document.getElementById("toast");
toast.textContent=msg;
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),2000);
}`
function showToast(message,type="success"){

const toast=document.getElementById("toast");

toast.innerText=message;

toast.className="show";

if(type==="success"){
toast.classList.add("toast-success");
}else{
toast.classList.add("toast-error");
}

setTimeout(()=>{
toast.className="";
},3000);

}
function updateCartCount(){
document.getElementById("cartCount").innerText=
cart.reduce((s,i)=>s+i.qty,0);
}

async function loadProducts(){

const {data,error}=await supabaseClient
.from("products")
.select("*")
.eq("active",true);

if(error){
showToast("Server waking up, refresh soon");
return;
}

productsData=data;

const container=document.getElementById("products");
container.innerHTML="";

data.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<p>Stock: ${p.stock}</p>

${
p.stock>0
? `<button onclick="addToCart('${p.id}')">Add to Cart</button>`
: `<p class="out">Out Of Stock</p>`
}

</div>
`;
});

}

function addToCart(id){

let item=cart.find(i=>i.id===id);

if(item){
item.qty+=1;
}else{
const p=productsData.find(x=>x.id===id);
cart.push({
id:String(p.id),
name:p.name,
price:p.price,
qty:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
showToast("Added to cart");

}

function changeQty(id,delta){

let item=cart.find(i=>i.id===id);
if(!item) return;

item.qty+=delta;

if(item.qty<=0){
removeItem(id);
return;
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
renderCart();

}

function removeItem(id){

cart=cart.filter(i=>i.id!==id);
localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
renderCart();

}

function openCart(){
document.getElementById("cartModal").style.display="flex";
renderCart();
}

function closeCart(){
document.getElementById("cartModal").style.display="none";
}

function clearCart(){
cart=[];
localStorage.removeItem("cart");
updateCartCount();
renderCart();
}

function renderCart(){

let total=0;
const container=document.getElementById("cartItems");
container.innerHTML="";

cart.forEach(item=>{

total+=item.price*item.qty;

container.innerHTML+=`
<div class="cart-item">

<div>
<b>${item.name}</b><br>
₹${item.price} × ${item.qty}
</div>

<div>
<button class="qty-btn" onclick="changeQty('${item.id}',-1)">-</button>
<button class="qty-btn" onclick="changeQty('${item.id}',1)">+</button>
<button class="qty-btn" onclick="removeItem('${item.id}')">🗑</button>
</div>

</div>
`;

});

let discount=total*0.05;
let finalAmount=Math.ceil(total-discount);
let advance=Math.ceil(finalAmount*0.2);

document.getElementById("totals").innerHTML=`
<p>Total: ₹${total}</p>
<p>Discount: -₹${discount.toFixed(2)}</p>
<p><b>Final: ₹${finalAmount.toFixed(2)}</b></p>
<p><b>Minimum Advance Required: ₹${advance}</b></p>
<hr>
<p>UPI: 9390683808@ibl</p>
`;

}

async function placeOrder(){

const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();
const paid=parseInt(document.getElementById("paid").value);
const file=document.getElementById("screenshot").files[0];

if(!name||!phone||!file||cart.length===0){
showToast("Fill all details");
return;
}

let total=cart.reduce((s,i)=>s+i.price*i.qty,0);
let discount=total*0.05;
let finalAmount=total-discount;
let advance=Math.ceil(finalAmount*0.2);

if(paid<advance){
showToast("Minimum advance ₹"+advance);
return;
}

/* IMPORTANT FIX: send only id + qty */

const orderItems=cart.map(i=>({
id:String(i.id),
qty:Number(i.qty||1)
}));

console.log("Items sent to DB:",orderItems);

const cleanName=file.name
.replace(/\s+/g,"_")
.replace(/[^a-zA-Z0-9._-]/g,"");

const fileName=Date.now()+"_"+cleanName;

await supabaseClient.storage
.from("screenshots")
.upload(fileName,file);

const {data:{publicUrl}}=
supabaseClient.storage
.from("screenshots")
.getPublicUrl(fileName);
showLoader();
const {error}=await supabaseClient.rpc("place_order",{
p_order_id:"GH"+Date.now(),
p_name:name,
p_phone:phone,
p_items:orderItems,
p_total:finalAmount,
p_discount:discount,
p_advance:advance,
p_screenshot_url:publicUrl
});

if(error){
console.error("RPC ERROR:",error);
// showToast(error.message);
hideLoader();
showToast("❌ Order failed. Please try again.","error");
return;
}
hideLoader();
showToast("🎉 Order placed successfully!", "success");
// showToast("Order placed 🎉");

cart=[];
localStorage.removeItem("cart");
updateCartCount();

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("paid").value="";
document.getElementById("screenshot").value="";

closeCart();
loadProducts();

}

updateCartCount();
loadProducts();

</script>
<div id="loaderOverlay">
  <div class="loaderBox">
    <div class="spinner"></div>
    <p>Processing your order...</p>
  </div>
</div>
</body>
</html>
